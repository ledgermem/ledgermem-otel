# Recommended OTel Collector pipeline for LedgerMem deployments.
# Routes traces → Tempo, metrics → Prometheus, logs → Loki.
# Add a `prometheusremotewrite` exporter if you ship metrics to a hosted backend.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Scrape the LedgerMem API's /metrics endpoint
  prometheus:
    config:
      scrape_configs:
        - job_name: ledgermem-api
          scrape_interval: 15s
          static_configs:
            - targets: ["api:9090"]

processors:
  batch:
    # send_batch_size is the *target* batch size; the processor will keep
    # accumulating beyond it until `timeout` elapses. Under a sustained burst
    # this lets a single batch grow until the exporter request exceeds the
    # backend limit (4 MiB on Tempo, 1 MiB on Loki) and the whole batch is
    # rejected. send_batch_max_size enforces a hard upper bound so large
    # incoming batches are split rather than dropped wholesale on queue full.
    send_batch_size: 8192
    send_batch_max_size: 16384
    timeout: 5s

  # Drop noisy health-check spans
  filter/healthchecks:
    traces:
      span:
        - 'attributes["http.target"] == "/healthz"'
        - 'attributes["http.target"] == "/readyz"'

  # Add deployment metadata to every signal
  resource:
    attributes:
      - key: service.namespace
        value: ledgermem
        action: insert
      - key: deployment.environment
        from_attribute: env
        action: insert

  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

exporters:
  # Traces → Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Metrics → Prometheus (pull model)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: ledgermem
    send_timestamps: true
    # Without this, resource attributes (service.namespace,
    # deployment.environment, k8s.pod.name, etc.) added by the `resource`
    # processor are silently dropped from scraped metrics — making it
    # impossible to filter by env or namespace in PromQL.
    resource_to_telemetry_conversion:
      enabled: true

  # Logs → Loki
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  # Debug to stdout (disable in prod)
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  # pprof exposes the Go runtime (heap, goroutines, allocator) and lets a
  # caller trigger CPU profiling. Bind to localhost only — anything more
  # open lets cluster neighbours profile / DoS the collector. Port-forward
  # for debugging.
  pprof:
    endpoint: 127.0.0.1:1777

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, filter/healthchecks, resource, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [loki]
  telemetry:
    logs:
      level: info
    metrics:
      level: detailed
